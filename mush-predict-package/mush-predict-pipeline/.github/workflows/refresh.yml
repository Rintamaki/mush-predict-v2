name: MUSH Predict Daily Refresh

on:
  schedule:
    # 6:00 AM Central Time (11:00 UTC)
    - cron: '0 11 * * *'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scrapers/requirements.txt

      - name: Run pipeline
        env:
          SAM_GOV_API_KEY: ${{ secrets.SAM_GOV_API_KEY }}
          ADZUNA_APP_ID:   ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY:  ${{ secrets.ADZUNA_APP_KEY }}
        run: python scrapers/run_pipeline.py

      - name: Commit updated data
        run: |
          git config --global user.name "MUSH Predict Bot"
          git config --global user.email "mush-bot@mckinstry.com"
          git add public/data/competitors.json
          git diff --staged --quiet || git commit -m "Daily competitor refresh $(date +'%Y-%m-%d')"
          git pull --rebase origin main
          git push

name: MUSH Predict Daily Refresh
on:
  schedule:
    - cron: '0 11 * * *'
  workflow_dispatch:
jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r scrapers/requirements.txt

      - name: Run pipeline
        env:
          SAM_GOV_API_KEY: ${{ secrets.SAM_GOV_API_KEY }}
          ADZUNA_APP_ID:   ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY:  ${{ secrets.ADZUNA_APP_KEY }}
        run: python scrapers/run_pipeline.py

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build persistent signals
        run: node scrapers/buildSignals.js

      - name: Commit updated data
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add mush-predict-package/public/data/competitors.json mush-predict-package/public/data/signals.json
          git diff --staged --quiet || git commit -m "Daily refresh $(date +'%Y-%m-%d')"
          git pull --rebase origin main
          git push --force origin main

name: MUSH Predict Daily Refresh

on:
  schedule:
    - cron: '0 11 * * *'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scrapers/requirements.txt

      - name: Run pipeline
        env:
          SAM_GOV_API_KEY: ${{ secrets.SAM_GOV_API_KEY }}
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
        run: python scrapers/run_pipeline.py

      # ✅ FIX: Node step properly separated
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Build signals (persist history)
        run: node buildSignals.js

      # ✅ FIX: Upload BOTH files
      - name: Upload data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 - <<'PYEOF'
          import base64, json, os, urllib.request

          token = os.environ["GITHUB_TOKEN"]
          repo = os.environ["GITHUB_REPOSITORY"]

          paths = [
              "public/data/competitors.json",
              "public/data/signals.json"
          ]

          for path in paths:
              with open(path, "rb") as f:
                  content = base64.b64encode(f.read()).decode()

              url = f"https://api.github.com/repos/{repo}/contents/{path}"

              req = urllib.request.Request(url, headers={
                  "Authorization": f"token {token}",
                  "Accept": "application/vnd.github.v3+json"
              })

              try:
                  with urllib.request.urlopen(req) as r:
                      sha = json.loads(r.read())["sha"]
              except:
                  sha = ""

              data = json.dumps({
                  "message": f"Update {path}",
                  "content": content,
                  "sha": sha
              }).encode()

              req2 = urllib.request.Request(
                  url,
                  data=data,
                  method="PUT",
                  headers={
                      "Authorization": f"token {token}",
                      "Content-Type": "application/json"
                  }
              )

              urllib.request.urlopen(req2)

          print("✅ Uploaded competitors + signals")
          PYEOF
